[build]
  command = "npm ci && node build.js"
  publish = "dist"
  functions = "netlify/functions"

# Supabase URL y anon key son PÚBLICAS por diseño (van al navegador,
# protegidas por RLS). El anon key y la URL deben aparecer en el HTML
# del frontend — no son secretos. Se excluyen del secrets scan.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,CLERK_PUBLISHABLE_KEY"
  NODE_VERSION = "22"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Scheduled Function (Bloque 7): recordatorios diarios de trial
# (sin_datos_dia2, trial_dia11, trial_dia14). "@daily" corre una vez
# cerca de medianoche UTC — la idempotencia real la da la tabla
# emails_enviados en _lib/emails.js, no este cron.
[functions."cron-trial"]
  schedule = "@daily"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Anti-clickjacking y tipo de contenido
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # HSTS — fuerza HTTPS por 2 años, incluye subdominios
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    
    # Permisos de APIs del browser (cámara, micrófono, geolocalización)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.clerk.dev https://clerk.zhorasone.com https://*.clerk.accounts.dev https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://*.clerk.com https://img.clerk.com; connect-src 'self' https://*.clerk.dev https://*.clerk.accounts.dev https://clerk.zhorasone.com https://*.clerk.com https://api.clerk.dev https://*.supabase.co wss://*.supabase.co https://api.mercadopago.com https://o4511719845986304.ingest.us.sentry.io https://cdn.jsdelivr.net https://browser.sentry-cdn.com; worker-src 'self' blob:; frame-src 'self' https://*.clerk.accounts.dev https://clerk.zhorasone.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# Headers específicos para assets estáticos — cache agresivo
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[build]
  command = "node build.js"
  publish = "dist"
  functions = "netlify/functions"

# Supabase URL y anon key son PÚBLICAS por diseño (van al navegador,
# protegidas por RLS). El anon key y la URL deben aparecer en el HTML
# del frontend — no son secretos. Se excluyen del secrets scan.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,CLERK_PUBLISHABLE_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Anti-clickjacking y tipo de contenido
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # HSTS — fuerza HTTPS por 2 años, incluye subdominios
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    
    # Permisos de APIs del browser (cámara, micrófono, geolocalización)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.clerk.dev https://clerk.zhorasone.com https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://*.clerk.com https://img.clerk.com; connect-src 'self' https://*.clerk.dev https://*.clerk.accounts.dev https://clerk.zhorasone.com https://*.clerk.com https://api.clerk.dev https://*.supabase.co wss://*.supabase.co https://api.mercadopago.com; worker-src 'self' blob:; frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# Headers específicos para assets estáticos — cache agresivo
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
